name: Daily triage

# Runs the triage pipeline on a schedule and commits the updated dashboard
# data (data/data.json) and dedup state (data/seen_issues.db) back to the
# repo. State lives in git, so runs need no external storage; delivery
# failures exit nonzero, which skips the commit step and leaves the issues
# unmarked for the next run to retry.
#
# Required repo secrets:
#   CLAUDE_CODE_OAUTH_TOKEN — from `claude setup-token` (subscription login,
#                             no API key; Pro/Max required)
#   GMAIL_ADDRESS           — digest sender
#   GMAIL_APP_PASSWORD      — Gmail app password (not the account password)
#   DIGEST_TO               — optional; defaults to GMAIL_ADDRESS
# GITHUB_TOKEN is provided automatically by Actions.

on:
  schedule:
    # GitHub cron is always UTC and ignores DST: 12:00 UTC = 5 AM Pacific in
    # summer (PDT), 4 AM in winter (PST). Use "0 13 * * *" for 5 AM PST strict.
    - cron: "0 12 * * *"
  workflow_dispatch: # manual runs from the Actions tab

permissions:
  contents: write # to push the data commit

concurrency:
  group: daily-triage # never two runs racing over the db

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run triage pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python -u src/main.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json data/seen_issues.db
          git diff --staged --quiet && echo "No new issues — nothing to commit." && exit 0
          git commit -m "Daily triage: update dashboard data and dedup state"
          git push
